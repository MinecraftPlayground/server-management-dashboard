name: 'Deploy'

on:
  push:
    branches: ["main"]

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout'
        uses: actions/checkout@v6
        
      - name: 'Setup Pages'
        uses: actions/configure-pages@v6

      - name: 'Upload artifact'
        uses: actions/upload-pages-artifact@v5
        with:
          path: './src/client/'

      - name: 'Deploy to GitHub Pages'
        uses: actions/deploy-pages@v5
